# RFUAV real-data access configuration.
hf_dataset: kitofrank/RFUAV
imageset_prefix: ImageSet-AllDrones-MatlabPipeline
split: train
images_per_drone: 6
# drone-profile key -> HF folder name mapping lives in rfuav/paper_params.py
drones: [DJI_MINI3, DJI_MINI4_PRO, DJI_AVATA2, DJI_MAVIC3_PRO, FUTABA_T14SG]
# V0 pass gate: real-vs-synthetic comparison runs on these two first;
# extend to MINI4_PRO / AVATA2 / MAVIC3_PRO once they pass.
compare_drones: [DJI_MINI3, FUTABA_T14SG]

real_image:
  duration_ms: 100.0    # one published image = 0.1 s frame
  span_mhz: 100.0       # full two-sided band at fs = 100 MS/s

# raw IQ (not auto-downloaded in V0; smallest pack is ~1.2 GB rar)
raw:
  smallest_pack: "YUNZHUO H16.rar"   # 1.216 GB, repo root of the HF dataset
  dtype: float32
  interleaved: true                  # I,Q,I,Q,...
  fs: 100.0e+6
